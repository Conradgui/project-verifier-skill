interface:
  display_name: "Project Verifier"
  short_description: "Understand projects with revision-bound verification evidence"
  default_prompt: "Use $project-verifier's five-phase workflow to understand and verify this project. Prefer existing scripts, keep raw evidence primary, bind high-risk actions to the current plan and source revision, and ask before code changes, live calls, costs, or optional public exports."

policy:
  allow_implicit_invocation: true
